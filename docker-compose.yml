services:
  fertilizer-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ogrodnik-asystent
    restart: always
    environment:
      - NODE_ENV=production
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ogrodnik.rule=Host(`ogrodnik.srv1490214.hstgr.cloud`)"
      - "traefik.http.routers.ogrodnik.entrypoints=websecure"
      - "traefik.http.routers.ogrodnik.tls=true"
      - "traefik.http.routers.ogrodnik.tls.certresolver=letsencrypt"
      - "traefik.http.services.ogrodnik.loadbalancer.server.port=80"

networks:
  traefik-proxy:
    external: true
