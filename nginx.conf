server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Disable caching for service worker and manifest to ensure quick updates
        location ~* \.(?:manifest\.json|appcache|html?|xml|json|js)$ {
            if ($request_uri ~* "sw.js") {
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            }
            expires -1;
        }

        # Cache control for static assets (images, fonts, styles)
        location ~* \.(?:css|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
